<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Navbar</title>

    <style>
        *{
            margin:0;
            padding:0;
            font-family:Arial, sans-serif;
        }

        body{
            background-color:#f2f2f2;
        }

        nav{
            display:flex;
            justify-content:space-between;
            align-items:center;
            background-color:white;
            padding:20px;
        }

        .logo{
            font-size:24px;
            font-weight:bold;
        }

        ul{
            display:flex;
            list-style:none;
        }

        ul li{
            margin:0 15px;
        }

        ul li a{
            text-decoration:none;
            color:black;
        }

        .buttons a{
            text-decoration:none;
            padding:8px 15px;
            margin-left:10px;
        }

        .login{
            border:1px solid black;
            color:black;
        }

        .signup{
            background-color:blue;
            color:white;
        }

        a:hover{
            color:blue;
        }
    </style>
</head>

<body>

<nav>

    <div class="logo">
        AYUSH.dev
    </div>

    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Projects</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
    </ul>

    <div class="buttons">
        <a href="#" class="login">Login</a>
        <a href="#" class="signup">Sign Up</a>
    </div>

</nav>

</body>
</html>
