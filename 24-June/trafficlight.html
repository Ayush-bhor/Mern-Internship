<!DOCTYPE html>
<html>

<head>
    <title>Traffic Signal</title>

    <style>
        body {
            text-align: center;
            margin-top: 50px;
            font-family: Arial;
        }

        .light {
            width: 100px;
            height: 100px;
            border: 2px solid black;
            border-radius: 50%;
            background-color: lightgray;
            margin: 10px auto;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>Traffic Signal</h1>

    <div class="light" id="red"></div>
    <div class="light" id="yellow"></div>
    <div class="light" id="green"></div>

    <button onclick="showRed()">Red</button>
    <button onclick="showYellow()">Yellow</button>
    <button onclick="showGreen()">Green</button>

    <script>
        function turnOff() {
            document.getElementById("red").style.backgroundColor = "lightgray";
            document.getElementById("yellow").style.backgroundColor = "lightgray";
            document.getElementById("green").style.backgroundColor = "lightgray";
        }

        function showRed() {
            turnOff();
            document.getElementById("red").style.backgroundColor = "red";
        }

        function showYellow() {
            turnOff();
            document.getElementById("yellow").style.backgroundColor = "yellow";
        }

        function showGreen() {
            turnOff();
            document.getElementById("green").style.backgroundColor = "green";
        }
    </script>

</body>

</html>
