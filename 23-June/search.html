<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Lite Search</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        body {
            background-color: #ffacac;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: black;
        }

        .controls {
            text-align: center;
            margin-bottom: 20px;
        }

        #searchBar {
            width: 300px;
            padding: 8px;
            border: 1px solid black;
        }

        select {
            padding: 8px;
            border: 1px solid black;
        }

        #productContainer {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        .card {
            width: 250px;
            background-color: white;
            border: 1px solid black;
            padding: 10px;
        }

        .card img {
            width: 100%;
            height: 180px;
        }

        .card h3 {
            margin-top: 10px;
            margin-bottom: 5px;
        }

        .price {
            color: green;
            font-weight: bold;
            margin-top: 5px;
        }

        .popular {
            color: blue;
            margin-top: 5px;
        }

        button {
            width: 100%;
            padding: 8px;
            margin-top: 10px;
            background-color: greenyellow;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>Amazon Lite</h1>

    <div class="controls">

        <input type="text" id="searchBar" placeholder="Search Product...">

        <select id="sortOption">
            <option value="">Sort By</option>
            <option value="low-high">Price Low to High</option>
            <option value="high-low">Price High to Low</option>
            <option value="popular">Most Popular</option>
        </select>

    </div>

    <div id="productContainer"></div>

    <script>

        let products = [

            {
                pname: "Watch",
                company: "Titan",
                price: 1500,
                popularity: 70,
                image: "https://www.sonatawatches.in/dw/image/v2/BKDD_PRD/on/demandware.static/-/Sites-titan-master-catalog/default/dw7b993993/images/Sonata/Catalog/7152QM01_1.jpg?sw=600&sh=600"
            },

            {
                pname: "Mobile",
                company: "Samsung",
                price: 30000,
                popularity: 95,
                image: "https://images.samsung.com/is/image/samsung/p6pim/in/s2602/gallery/in-galaxy-s26-ultra-s948-sm-s948bzvqins-thumb-550793828"
            },

            {
                pname: "Laptop",
                company: "HP",
                price: 100000,
                popularity: 90,
                image: "https://media.wired.com/photos/67e5bd328eceed9f2cae96f3/master/w_1600%2Cc_limit/Razer-Blade-16-2025-Laptop-(front)-Reviewer-Photo-SOURCE-Luke-Larsen.jpg"
            },

            {
                pname: "Headphone",
                company: "Boat",
                price: 5000,
                popularity: 85,
                image: "https://resource.logitech.com/w_416,h_312,ar_4:3,c_pad,q_auto,f_auto,dpr_1.0/d_transparent.gif/content/dam/logitech/en/products/headsets/zone-wired-2-b2c/gallery/b2c-zone-wired2-headset-graphite-gallery1.png"
            },

            {
                pname: "Mouse",
                company: "Dell",
                price: 3500,
                popularity: 80,
                image: "https://sony.scene7.com/is/image/sonyglobalsolutions/GG25_MSE-G500_Primary_image?$categorypdpnav$&fmt=png-alpha"
            }

        ];

        const container = document.getElementById("productContainer");
        const searchBar = document.getElementById("searchBar");
        const sortOption = document.getElementById("sortOption");

        function display(list) {

            container.innerHTML = "";

            list.forEach(product => {

                let div = document.createElement("div");

                div.className = "card";

                div.innerHTML = `
            <img src="${product.image}" alt="Product Image">

            <h3>${product.pname}</h3>

            <p>Company: ${product.company}</p>

            <p class="price">Price: ₹${product.price}</p>

            <p class="popular">
                Popularity: ${product.popularity}
            </p>

            <button>Buy Now</button>
        `;

                container.appendChild(div);

            });
        }

        function filterAndSort() {

            let searchValue =
                searchBar.value.toLowerCase();

            let filtered = products.filter(product => {

                return (
                    product.pname.toLowerCase().includes(searchValue)
                    ||
                    product.company.toLowerCase().includes(searchValue)
                );

            });

            let sortValue = sortOption.value;

            if (sortValue === "low-high") {

                filtered.sort((a, b) =>
                    a.price - b.price
                );

            }
            else if (sortValue === "high-low") {

                filtered.sort((a, b) =>
                    b.price - a.price
                );

            }
            else if (sortValue === "popular") {

                filtered.sort((a, b) =>
                    b.popularity - a.popularity
                );

            }

            display(filtered);
        }

        searchBar.addEventListener(
            "input",
            filterAndSort
        );

        sortOption.addEventListener(
            "change",
            filterAndSort
        );

        display(products);

    </script>

</body>

</html>
