<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Amazon Lite Search</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f4f4;
            padding:30px;
        }

        h1{
            text-align:center;
            margin-bottom:20px;
            color:#232f3e;
        }

        .controls{
            display:flex;
            justify-content:center;
            gap:15px;
            margin-bottom:25px;
            flex-wrap:wrap;
        }

        #searchBar{
            width:350px;
            padding:12px;
            border:2px solid #ddd;
            border-radius:8px;
            font-size:16px;
        }

        select{
            padding:12px;
            border-radius:8px;
            border:2px solid #ddd;
            cursor:pointer;
        }

        #productContainer{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
        }

        .card{
            background:white;
            border-radius:12px;
            overflow:hidden;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-5px);
        }

        .card img{
            width:100%;
            height:220px;
            object-fit:cover;
        }

        .card-body{
            padding:15px;
        }

        .card h3{
            margin-bottom:10px;
        }

        .price{
            color:green;
            font-size:18px;
            font-weight:bold;
            margin:10px 0;
        }

        .popular{
            color:orange;
            font-weight:bold;
        }

        button{
            width:100%;
            padding:10px;
            background:#ff9900;
            border:none;
            color:white;
            border-radius:6px;
            cursor:pointer;
            font-size:15px;
        }

        button:hover{
            background:#e68a00;
        }

    </style>
</head>

<body>

    <h1>Amazon Lite</h1>

    <div class="controls">

        <input
            type="text"
            id="searchBar"
            placeholder="Search Product..."
        >

        <select id="sortOption">
            <option value="">Sort By</option>
            <option value="low-high">Price Low → High</option>
            <option value="high-low">Price High → Low</option>
            <option value="popular">Most Popular</option>
        </select>

    </div>

    <div id="productContainer"></div>

<script>

let products = [

{
    pname:"Watch",
    company:"Titan",
    price:1000,
    popularity:70,
    image:"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500"
},

{
    pname:"Mobile",
    company:"Samsung",
    price:25000,
    popularity:95,
    image:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=500"
},

{
    pname:"Laptop",
    company:"HP",
    price:55000,
    popularity:90,
    image:"https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=500"
},

{
    pname:"Headphone",
    company:"Boat",
    price:2000,
    popularity:85,
    image:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500"
},

{
    pname:"Shoes",
    company:"Nike",
    price:3500,
    popularity:80,
    image:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500"
}

];

const container = document.getElementById("productContainer");
const searchBar = document.getElementById("searchBar");
const sortOption = document.getElementById("sortOption");

function display(list){

    container.innerHTML="";

    list.forEach(product=>{

        let div = document.createElement("div");

        div.className = "card";

        div.innerHTML = `
            <img src="${product.image}" alt="">
            
            <div class="card-body">

                <h3>${product.pname}</h3>

                <p>${product.company}</p>

                <p class="price">₹${product.price}</p>

                <p class="popular">
                    Popularity : ${product.popularity}
                </p>

                <button>Buy Now</button>

            </div>
        `;

        container.appendChild(div);

    });
}

function filterAndSort(){

    let searchValue =
        searchBar.value.toLowerCase();

    let filtered = products.filter(product => {

        return (
            product.pname.toLowerCase()
            .includes(searchValue)

            ||

            product.company.toLowerCase()
            .includes(searchValue)
        );

    });

    let sortValue = sortOption.value;

    if(sortValue === "low-high"){

        filtered.sort((a,b)=>
            a.price - b.price
        );

    }

    else if(sortValue === "high-low"){

        filtered.sort((a,b)=>
            b.price - a.price
        );

    }

    else if(sortValue === "popular"){

        filtered.sort((a,b)=>
            b.popularity - a.popularity
        );

    }

    display(filtered);
}

searchBar.addEventListener(
    "input",
    filterAndSort
);

sortOption.addEventListener(
    "change",
    filterAndSort
);

display(products);

</script>

</body>
</html>
