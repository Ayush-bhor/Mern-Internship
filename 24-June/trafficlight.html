<!DOCTYPE html>
<html>

<head>
    <title>Traffic Signal</title>
    <style>
        body {
            margin-top: 50px;
            text-align: center;

        }

        .light {
            height: 80px;
            width: 80px;
            border: 1px solid;
            border-radius: 50%;
            margin-left: 600px;

        }

        button {
            margin-top: 50px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>Traffic Signal</h1>

    <div class="signal">
        <div class="light" id="red"></div>
        <div class="light" id="yellow"></div>
        <div class="light" id="green"></div>
    </div>

    <button id="redBtn">Red</button>
    <button id="yellowBtn">Yellow</button>
    <button id="greenBtn">Green</button>



</body>

</html>
